<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huddle - Login</title>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1471&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            color: white;
            padding: 30px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.7); }

        .btn-signin {
            background: #ffffff;
            color: #00b09b;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        .btn-signin:hover {
            background: #00b09b;
            color: white;
        }

        .glass-card a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
        }

        .glass-card a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
         .glass-card a {
            color: white;  
            transition: color 0.3s ease; 
            text-decoration: none;
        }
 
        .glass-card a:hover {
            color: #38ef7d;  
            text-decoration: underline;
        }
        .form-check-input:checked {
            background-color: #38ef7d !important;  
            border-color: #38ef7d !important;     
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3e%3cpath fill='none' stroke='%23fff' stroke-linecap='round' stroke-linejoin='round' stroke-width='3' d='m6 10 3 3 6-6'/%3e%3c/svg%3e") !important;
        }
         .form-check-input:focus {
            box-shadow: 0 0 0 0.25rem rgba(56, 239, 125, 0.25) !important;
            border-color: #38ef7d !important;
        }
    </style>
</head>
<body>

    
    <div class="container d-flex justify-content-center">
        <div class="glass-card shadow-lg">
            <form action="">
                <div class="text-center mb-4">
                    <img src="../assets/images/logo.png" alt="Logo" style="width: 70px; height: auto;" class="mb-2">
                    <h2 class="fw-bold m-0 text-white">Huddle</h2>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold">User name</label>
                    <input type="text" class="form-control" placeholder="enter your username">
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold">Email</label>
                    <input type="email" class="form-control" placeholder="enter your Email">
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" class="form-control" placeholder="enter your password">
                </div>

                <div class="mb-3 form-check text-start d-inline-block w-100">
                    <input type="checkbox" class="form-check-input" id="terms">
                    <label class="form-check-label small" for="dispass">Show Password</label>
                </div>

                <div class="mb-3 form-check text-start d-inline-block w-100">
                    <input type="checkbox" class="form-check-input" id="terms">
                    <label class="form-check-label small" for="terms"><a href="terms.html">I Accept The Terms And Conditions</a></label>
                </div>

                <div class="mb-4 text-center">
                    <a href="resetpass.html" class="small">Forgot Password?</a>
                </div>

                <div class="d-grid mb-4">
                    <button class="btn btn-signin rounded-pill py-2 shadow">Sign In</button>
                </div>

                <div class="text-center">
                    <span class="small">new user? </span> 
                    <a href="register.html" class="fw-bold ms-1">Register Now</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
