<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huddle - Reset Password</title>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1471&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding-top: 80px;
            display: flex;
            align-items: center;
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 35px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .btn-reset {
            background: #ffffff;
            color: #00b09b;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        .btn-reset:hover {
            background: #00b09b;
            color: white;
        }

        a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
        }

        a:hover {
            color: #38ef7d;
            text-decoration: underline;
        }

        .navbar {
            background: transparent;
        }

        .nav-link {
            color: white;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #38ef7d;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar position-fixed top-0 w-100 px-4">
    <div class="container-fluid">
        <a class="navbar-brand text-white fw-bold" href="index.html">Huddle</a>
        <div class="ms-auto">
            <a href="index.html" class="nav-link">Back to Login</a>
        </div>
    </div>
</nav>

<!-- Reset Card -->
<div class="container d-flex justify-content-center">
    <div class="glass-card text-center">

        <img src="../assets/images/logo.png" alt="Huddle Logo" style="width: 70px;" class="mb-3">

        <h3 class="fw-bold mb-2">Reset Password</h3>
        <p class="small mb-4">
            Enter your registered email address and we’ll send you a password reset link.
        </p>

        <form>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">Email Address</label>
                <input type="email" class="form-control" placeholder="enter your email" required>
            </div>

            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-reset rounded-pill py-2 shadow">
                    Send Reset Link
                </button>
            </div>
        </form>

        <div class="text-center">
            <a href="index.html" class="small">← Back to Sign In</a>
        </div>

    </div>
</div>

</body>
</html>
